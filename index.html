<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WikiHub – Free Knowledge Videos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="header-inner">
    <div class="logo" onclick="showHome()">Wiki<span>Hub</span></div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Rechercher des articles Wikipédia..." autocomplete="off">
      <button onclick="searchWiki()">🔍</button>
    </div>
    <div class="header-actions">
      <button class="btn-outline">Se connecter</button>
      <button class="btn-fill">S'inscrire</button>
    </div>
  </div>
</header>

<!-- ── CATEGORY NAV ── -->
<nav class="cat-nav">
  <div class="cat-nav-inner">
    <button class="cat-btn active" onclick="filterCat(this,'')">Tout</button>
    <button class="cat-btn" onclick="filterCat(this,'Science')">⚗️ Science</button>
    <button class="cat-btn" onclick="filterCat(this,'Histoire')">🏛️ Histoire</button>
    <button class="cat-btn" onclick="filterCat(this,'Géographie')">🌍 Géographie</button>
    <button class="cat-btn" onclick="filterCat(this,'Arts')">🎨 Arts</button>
    <button class="cat-btn" onclick="filterCat(this,'Technologie')">💻 Technologie</button>
    <button class="cat-btn" onclick="filterCat(this,'Sport')">⚽ Sport</button>
    <button class="cat-btn" onclick="filterCat(this,'Politique')">🏛 Politique</button>
    <button class="cat-btn" onclick="filterCat(this,'Nature')">🌿 Nature</button>
    <button class="cat-btn" onclick="filterCat(this,'Philosophie')">🧠 Philosophie</button>
  </div>
</nav>

<!-- ════════════════════════════════════════════════════ -->
<!--  PAGE 1 : ACCUEIL / GRILLE                            -->
<!-- ════════════════════════════════════════════════════ -->
<div class="page" id="homePage">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Navigation</div>
      <span class="sidebar-link active" id="nav-home" onclick="sideNav(this,'home')">🏠 Accueil</span>
      <span class="sidebar-link" id="nav-trending" onclick="sideNav(this,'trending')">🔥 Tendances Wikipedia</span>
      <span class="sidebar-link" id="nav-reco" onclick="sideNav(this,'reco')">⭐ Recommandés</span>
      <span class="sidebar-link" id="nav-history" onclick="sideNav(this,'history')">📺 Historique <span class="hist-badge" id="histBadge"></span></span>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Catégories</div>
      <span class="sidebar-link" onclick="filterCat(this,'Science')">⚗️ Science</span>
      <span class="sidebar-link" onclick="filterCat(this,'Histoire')">🏛️ Histoire</span>
      <span class="sidebar-link" onclick="filterCat(this,'Géographie')">🌍 Géographie</span>
      <span class="sidebar-link" onclick="filterCat(this,'Arts')">🎨 Arts</span>
      <span class="sidebar-link" onclick="filterCat(this,'Technologie')">💻 Technologie</span>
      <span class="sidebar-link" onclick="filterCat(this,'Sport')">⚽ Sport</span>
      <span class="sidebar-link" onclick="filterCat(this,'Politique')">🏛 Politique</span>
      <span class="sidebar-link" onclick="filterCat(this,'Nature')">🌿 Nature</span>
      <span class="sidebar-link" onclick="filterCat(this,'Philosophie')">🧠 Philosophie</span>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- SECTION RECOMMANDÉ (affiché si historique non vide) -->
    <div class="section-bloc" id="recoSection" style="display:none">
      <div class="section-header">
        <div class="section-title">⭐ Recommandés pour vous</div>
      </div>
      <div class="video-grid" id="recoGrid"></div>
    </div>

    <!-- SECTION PRINCIPALE -->
    <div class="section-header">
      <div class="section-title" id="sectionTitle">Articles populaires</div>
      <div class="sort-options">
        <button class="sort-btn active" onclick="sortBy(this,'views')">Vues</button>
        <button class="sort-btn" onclick="sortBy(this,'recent')">Récent</button>
        <button class="sort-btn" onclick="sortBy(this,'duration')">Durée</button>
      </div>
    </div>

    <div class="video-grid" id="videoGrid"></div>

    <div class="load-more" id="loadMoreBtn">
      <button class="btn-load" onclick="loadMore()">Charger plus d'articles</button>
    </div>

  </main>
</div>

<!-- ════════════════════════════════════════════════════ -->
<!--  PAGE 2 : LECTURE VIDÉO (page complète, pas un modal) -->
<!-- ════════════════════════════════════════════════════ -->
<div class="page video-page" id="videoPage" style="display:none">

  <!-- COLONNE PRINCIPALE : player + infos -->
  <div class="vp-main">

    <button class="vp-back" onclick="goBack()">← Retour</button>

    <!-- Player -->
    <div class="player-area">
      <div class="player-thumb" id="playerThumb"></div>
      <div class="player-bar">
        <div class="progress-track" onclick="seekProgress(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="player-controls">
          <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlay()">⏸</button>
          <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
          <div class="ctrl-spacer"></div>
          <button class="ctrl-btn" onclick="openWikiDirect()" title="Ouvrir sur Wikipédia">🌐</button>
        </div>
      </div>
    </div>

    <!-- Infos sous le player -->
    <div class="vp-info">
      <div class="vp-title" id="vpTitle"></div>

      <div class="vp-row">
        <div class="vp-channel-block">
          <div class="vp-channel-avatar" id="vpChannelAvatar"></div>
          <div>
            <div class="modal-channel" id="vpChannel"></div>
            <div class="vp-meta" id="vpMeta"></div>
          </div>
        </div>

        <div class="stats-bar">
          <button class="like-btn" id="vpLikeBtn" onclick="toggleLike()">👍 <span id="vpLikeCount">0</span></button>
          <button class="dislike-btn">👎 <span id="vpDislikeCount">0</span></button>
          <span class="watch-count-badge" id="vpWatchBadge">Premier visionnage</span>
          <button class="save-btn">🔖 Sauvegarder</button>
        </div>
      </div>

      <div class="modal-divider"></div>
      <div id="vpContent">
        <div class="loading-text"><span class="spinner"></span>Chargement...</div>
      </div>
    </div>

  </div>

  <!-- COLONNE LATÉRALE : vidéos liées (comme un vrai site de streaming) -->
  <aside class="vp-related">
    <div class="sidebar-title">À regarder ensuite</div>
    <div class="related-list" id="vpRelated"></div>
  </aside>

</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<!-- ── JS ── -->
<script src="app.js"></script>
<script>
// Sort inline (besoin d'accès à allCards)
function sortBy(btn, mode) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  let sorted = [...allCards];
  if (mode === 'views') sorted.sort((a,b) => (b.realViews ?? b.views) - (a.realViews ?? a.views));
  if (mode === 'duration') sorted.sort((a,b) => b.dur - a.dur);
  if (mode === 'recent') sorted.reverse();
  renderGrid(sorted.slice(0,20), 'videoGrid');
}
</script>

</body>
</html>
